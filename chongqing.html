<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>William's Photography - Chongqing</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="chongqing.css">
</head>
<body>

    <a href="index.html" class="btn-back">← BACK TO HOME</a>

    <div class="ambient-bg" id="ambient-bg"></div>
    <div class="noise-overlay"></div>

    <header class="hero-fixed">
        <h1 class="hero-title glow-text">CHONGQING</h1>
        <p class="hero-subtitle">V02 // THE VERTICAL TUNNEL</p>
    </header>

    <div class="scroll-proxy" id="scroll-proxy"></div>

    <main class="camera-viewport">
        <div class="tunnel-scene" id="tunnel">
            
            <article class="tunnel-item is-portrait" style="--z: 0;" data-color="rgba(0, 240, 255, 0.2)">
                <div class="image-wrapper red-neon">
                    <img src="images/cq2.webp" alt="CQ 01">
                </div>
                <div class="meta"><span>01</span><p>Z9 / 24MM / F/4.0</p></div>
            </article>

            <article class="tunnel-item" style="--z: -2000;" data-color="rgba(0, 240, 255, 0.2)">
                <div class="image-wrapper cyan-neon">
                    <img src="images/chongqing1.webp" alt="CQ 02">
                </div>
                <div class="meta"><span>02</span><p>Z9 / 24MM / F/4.0</p></div>
            </article>

            <article class="tunnel-item" style="--z: -4000;" data-color="rgba(184, 184, 184, 0.3)">
                <div class="image-wrapper purple-neon">
                    <img src="images/cq3.webp" alt="CQ 03">
                </div>
                <div class="meta"><span>03</span><p>Z9 / Pano-24MM / F/8.0</p></div>
            </article>

            <article class="tunnel-item is-portrait" style="--z: -6000;" data-color="rgba(184, 184, 184, 0.3)">
                <div class="image-wrapper purple-neon">
                    <img src="images/cq4.webp" alt="CQ 04">
                </div>
                <div class="meta"><span>04</span><p>Z9 / 65MM / RED F/5.6</p></div>
            </article>

            <article class="tunnel-item" style="--z: -8000;" data-color="rgba(0, 240, 255, 0.2)">
                <div class="image-wrapper cyan-neon">
                    <img src="images/cq5.webp" alt="CQ 05">
                </div>
                <div class="meta"><span>05</span><p>Z9 / Pano-24MM / F/4.0</p></div>
            </article>

            <article class="tunnel-item is-portrait" style="--z: -10000;" data-color="rgba(138, 43, 226, 0.2)">
                <div class="image-wrapper purple-neon">
                    <img src="images/cq6.webp" alt="CQ 06">
                </div>
                <div class="meta"><span>06</span><p>谢谢</p></div>
            </article>

        </div>
    </main>

    <script src="chongqing.js"></script>
</body>
</html>
