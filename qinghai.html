<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qinghai Panoramas | Will's Photography</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="qinghai.css">
   <link rel="icon" type="image/png" href="images/favicon.png">
</head>
<body>

    <a href="index.html" class="btn-back">← Back to Home</a>

    <main class="gallery-track">
        
        <article class="pano-item">
            <img src="images/pano.webp" alt="Qinghai Lake Panorama" loading="lazy">
            <div class="pano-caption">
                <h3>Qinghai Lake</h3>
                <p>Nikon Z9 | 14mm | f/8</p>
            </div>
        </article>

        <article class="pano-item">
            <img src="images/japan1.jpg" alt="Chaka Salt Lake" loading="lazy">
            <div class="pano-caption">
                <h3>Chaka Salt Lake</h3>
                <p>Nikon Z9 | 24mm | f/11</p>
            </div>
        </article>

        <article class="pano-item">
            <img src="images/qinghai1.jpg" alt="Qunjia Forest" loading="lazy">
            <div class="pano-caption">
                <h3>Qunjia</h3>
                <p>Nikon Z9 | 70mm | f/2.8</p>
            </div>
        </article>

        <article class="pano-item end-credits">
            <h2>End of the journey.</h2>
        </article>

    </main>
<script>
    const track = document.querySelector('.gallery-track');

    track.addEventListener('wheel', (event) => {
        // 1. 如果用户用触控板左右划，完全放行
        if (Math.abs(event.deltaX) > Math.abs(event.deltaY)) {
            return;
        }

        // 2. 拦截上下滚动，转化为丝滑的横向自由移动
        if (event.deltaY !== 0) {
            event.preventDefault(); 
            
            // 阻尼系数（减速器）：防止苹果触控板太滑导致画面乱飞
            // 0.8 是一个很舒服的逛画廊速度，你可以自己微调
            const scrollSpeed = 0.8; 
            
            track.scrollBy({
                left: event.deltaY * scrollSpeed,
                behavior: 'auto' // 去掉 smooth，让画面完全贴合手指的物理惯性
            });
        }
    }, { passive: false });
</script>
</body>
</html>
